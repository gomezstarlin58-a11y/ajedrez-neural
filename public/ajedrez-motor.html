<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Físico Ajedrez - HD</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.2/chess.js"></script>
    
    <style>
        body { margin: 0; padding: 0; background-color: #020617; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; background-image: radial-gradient(circle at center, #0f172a 0%, #020617 100%); }
        #tablero { width: 95vw; height: 95vw; max-width: 550px; max-height: 550px; border: 8px solid #1e120d; border-bottom: 25px solid #0a0604; border-radius: 6px; box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 20px rgba(0,0,0,0.5); }
        .white-1e1d7 { background-color: #e2e8f0; }
        .black-3c85d { background-color: #334155; }
        .piece-417db { filter: drop-shadow(4px 10px 5px rgba(0, 0, 0, 0.7)); transition: transform 0.1s ease; }
        .piece-417db:active { filter: drop-shadow(10px 20px 10px rgba(0, 0, 0, 0.5)); transform: scale(1.1) translateY(-5px); }
        .vulnerable { background-color: rgba(239, 68, 68, 0.6) !important; box-shadow: inset 0 0 30px 10px rgba(220, 38, 38, 0.9), 0 0 15px red !important; border: 2px solid #f87171; border-radius: 4px; animation: latido 1.5s infinite; }
        @keyframes latido { 0% { box-shadow: inset 0 0 30px 10px rgba(220, 38, 38, 0.9); } 50% { box-shadow: inset 0 0 10px 2px rgba(220, 38, 38, 0.5); } 100% { box-shadow: inset 0 0 30px 10px rgba(220, 38, 38, 0.9); } }
    </style>
</head>
<body>
    <div id="tablero"></div>

    <script>
        var board = null;
        var game = new Chess();
        var idCasillasVulnerables = [];
        
        // 🔥 CORRECCIÓN: Por defecto 'libre' para no romper la Academia 🔥
        var miBandoActual = 'libre'; 

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            
            // Reglas estrictas solo si se define un bando (como en el Coliseo)
            if (miBandoActual !== 'libre') {
                if (miBandoActual === 'w' && piece.search(/^b/) !== -1) return false; 
                if (miBandoActual === 'b' && piece.search(/^w/) !== -1) return false; 
            }
        }

        function onDrop (source, target) {
            limpiarVulnerabilidades();
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';

            window.parent.postMessage({
                tipo: 'HUMANO_MOVIO',
                fen: game.fen(),
                san: move.san
            }, '*');
        }

        function onSnapEnd () { board.position(game.fen()); }

        function limpiarVulnerabilidades() {
            idCasillasVulnerables.forEach(function(casilla) {
                $('#tablero .square-' + CSS.escape(casilla)).removeClass('vulnerable');
            });
            idCasillasVulnerables = [];
        }

        var config = {
            draggable: true, 
            position: 'start', onDragStart: onDragStart, onDrop: onDrop, onSnapEnd: onSnapEnd,
            pieceTheme: 'https://lichess1.org/assets/piece/cburnett/{piece}.svg'
        };
        board = Chessboard('tablero', config);

        window.addEventListener('message', function(event) {
            if (event.data.tipo === 'SET_BANDO') {
                miBandoActual = event.data.bando;
                if (miBandoActual === 'b') { board.orientation('black'); } 
                else { board.orientation('white'); }
            }
            // 🔥 AQUÍ ESTÁ LA PIEZA FALTANTE QUE ROMPIÓ LOS PUZZLES 🔥
            else if (event.data.tipo === 'CARGAR_FEN') {
                if (game.fen() !== event.data.fen) {
                    limpiarVulnerabilidades();
                    game.load(event.data.fen);
                    board.position(game.fen());
                }
            } 
            else if (event.data.tipo === 'REINICIAR') {
                game.reset();
                board.start();
                limpiarVulnerabilidades();
            }
            else if (event.data.tipo === 'JUGADA_HUMANA_TEXTO') {
                var jugada = event.data.san.trim();
                var move = game.move(jugada, { sloppy: true });
                if (move) {
                    board.position(game.fen());
                    window.parent.postMessage({
                        tipo: 'HUMANO_MOVIO',
                        fen: game.fen(),
                        san: move.san
                    }, '*');
                } else {
                    window.parent.postMessage({ tipo: 'ERROR_JUGADA', mensaje: jugada }, '*');
                }
            }
            else if (event.data.tipo === 'JUGADA_MOTOR') {
                var jugada = event.data.san;
                var move = null;
                if (typeof jugada === 'string' && (jugada.length === 4 || jugada.length === 5)) {
                    move = game.move({ from: jugada.substring(0, 2), to: jugada.substring(2, 4), promotion: 'q' });
                }
                if (move) {
                    board.position(game.fen());
                    window.parent.postMessage({
                        tipo: 'MOTOR_MOVIO',
                        fen: game.fen(),
                        san: move.san 
                    }, '*');
                }
            }
        });
    </script>
</body>
</html>
